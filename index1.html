<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>

    <h2>User Registration Form</h2>

    <form action="index2.html" method="post">
        <label for="fname">First Name:</label>
        <input type="text"
               id="fname"
               name="first_name"
               value="Nesha"
               autofocus
               required>
        <br><br>
        <label for="lname">Last Name:</label>
        <input type="text"
               id="lname"
               name="last_name"
               required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email"
               id="email"
               name="email"
               required>
        <br><br>
        <label for="password">Password:</label>
        <input type="password"
               id="password"
               name="password"
               required>
        <br><br>
        <button type="submit">Register</button>
        <button type="submit"
                formaction="backup_submit.php">
            Register via Backup
        </button>

    </form>

</body>
</html>
